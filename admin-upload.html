<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Phương Lâm Admin - Upload sản phẩm</title>
  <style>
    :root {
      --green: #2f7d24;
      --green-dark: #25651d;
      --soft: #f5faf2;
      --line: #dde8d8;
      --text: #1f1f1f;
      --muted: #777;
      --danger: #d64545;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-rounded, "SF Pro Rounded", "Nunito", system-ui, sans-serif;
      background: linear-gradient(135deg, #fbfff8, #f3f8ef);
      color: var(--text);
    }

    .wrap { max-width: 1440px; margin: 0 auto; padding: 28px; }
    .topbar { display: flex; justify-content: space-between; gap: 16px; align-items: center; margin-bottom: 22px; }
    h1 { margin: 0; font-size: 34px; letter-spacing: -.03em; }
    .sub { color: var(--muted); margin-top: 6px; }
    .panel {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 18px 50px rgba(38, 91, 30, .08);
    }

    .login { max-width: 480px; margin: 80px auto; padding: 28px; }
    .grid { display: grid; grid-template-columns: 360px 1fr; gap: 22px; align-items: start; }
    .side { padding: 18px; position: sticky; top: 18px; max-height: calc(100vh - 36px); overflow: auto; }
    .editor { padding: 22px; }

    input, textarea, select, button {
      font: inherit;
      border-radius: 14px;
    }
    input, textarea, select {
      width: 100%;
      border: 1px solid #ddd;
      padding: 13px 14px;
      background: #fff;
      outline: none;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(47,125,36,.12); }
    textarea { min-height: 100px; resize: vertical; }
    label { display: block; font-weight: 800; color: #4b4b4b; margin: 14px 0 7px; }

    button {
      border: 0;
      padding: 12px 18px;
      background: var(--green);
      color: #fff;
      font-weight: 900;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(47,125,36,.18); }
    button.secondary { background: #fff; color: var(--green); border: 1px solid var(--line); }
    button.danger { background: #fff5f5; color: var(--danger); border: 1px solid #ffd0d0; }
    button.small { padding: 9px 12px; font-size: 13px; }

    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .tab {
      background: #fff;
      color: #4f614b;
      border: 1px solid var(--line);
      padding: 10px 16px;
      border-radius: 999px;
      box-shadow: none;
    }
    .tab.active {
      background: var(--green);
      color: #fff;
      border-color: var(--green);
    }
    .row { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .row3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
    .card-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px; }
    .config-images { grid-template-columns: repeat(auto-fill, minmax(132px, 1fr)); gap: 10px; }
    .config-card-grid { grid-template-columns: repeat(auto-fill, minmax(132px, 1fr)); gap: 10px; }
    .status { margin-top: 12px; font-weight: 800; color: var(--green); }

    .product-item {
      display: grid;
      grid-template-columns: 58px 1fr;
      gap: 12px;
      padding: 12px;
      border-radius: 16px;
      cursor: pointer;
      border: 1px solid transparent;
      margin-bottom: 8px;
    }
    .product-item.active { background: var(--soft); border-color: var(--line); }
    .product-item.is-hidden { opacity: .58; background: #fbfbfb; }
    .hidden-badge {
      display: inline-flex;
      align-items: center;
      margin-left: 6px;
      padding: 2px 7px;
      border-radius: 999px;
      background: #888;
      color: #fff;
      font-size: 11px;
      font-weight: 900;
      vertical-align: middle;
    }
    .thumb {
      width: 58px;
      height: 58px;
      aspect-ratio: 1 / 1;
      border-radius: 14px;
      background: repeating-linear-gradient(45deg, #eef5ec, #eef5ec 10px, #f7fbf5 10px, #f7fbf5 20px);
      object-fit: cover;
      overflow: hidden;
      display: grid;
      place-items: center;
      color: #999;
      font-size: 11px;
    }
    .name { font-weight: 900; line-height: 1.25; }
    .price { color: var(--green); font-weight: 900; margin-top: 4px; }
    .muted { color: var(--muted); }

    .images {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }
    .image-box {
      width: 100%;
      border: 2px dashed #d7d7d7;
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      background: #fafafa;
      display: grid;
      place-items: center;
      text-align: center;
      color: #aaa;
      cursor: pointer;
      overflow: hidden;
      position: relative;
      transition: border-color .18s ease, background .18s ease, box-shadow .18s ease, transform .18s ease;
    }
    .image-box.dragging,
    .variant-img.dragging {
      border-color: var(--green);
      background: #f1faee;
      box-shadow: 0 16px 34px rgba(47,125,36,.16);
      transform: translateY(-2px);
    }
    .image-box img { width: 100%; height: 100%; object-fit: cover; }
    .image-box span { padding: 10px; }
    .config-image-box { border-radius: 14px; font-size: 12px; }
    .remove-img {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(255,255,255,.92);
      color: var(--danger);
      border: 1px solid #ffd0d0;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
    }

    .variant {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      margin-top: 12px;
      background: #fff;
    }
    .variant-grid {
      display: grid;
      grid-template-columns: 82px 1.2fr .8fr .8fr .7fr .8fr 70px;
      gap: 10px;
      align-items: end;
    }
    .variant-img {
      width: 72px;
      height: 72px;
      aspect-ratio: 1 / 1;
      border: 1px dashed #ccc;
      border-radius: 14px;
      background: #fafafa;
      display: grid;
      place-items: center;
      overflow: hidden;
      cursor: pointer;
      color: #999;
      font-size: 12px;
      transition: border-color .18s ease, background .18s ease, box-shadow .18s ease, transform .18s ease;
    }
    .variant-img img { width: 100%; height: 100%; object-fit: cover; }
    .mini-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px;
      background: #fff;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }
    .mini-card.active {
      border-color: var(--green);
      background: #f3fbf1;
      box-shadow: 0 12px 28px rgba(47,125,36,.12);
    }
    .mini-card:hover { transform: translateY(-2px); }
    .config-mini { padding: 8px; border-radius: 14px; }
    .config-mini .name { font-size: 13px; }
    .featured-slots {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(142px, 1fr));
      gap: 12px;
    }
    .featured-slot {
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      cursor: pointer;
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }
    .featured-slot.active { border-color: var(--green); background: #f3fbf1; }
    .featured-slot:hover { transform: translateY(-2px); box-shadow: 0 12px 26px rgba(47,125,36,.12); }
    .featured-slot-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 12px;
      background: repeating-linear-gradient(45deg, #eef5ec, #eef5ec 10px, #f7fbf5 10px, #f7fbf5 20px);
      overflow: hidden;
      display: grid;
      place-items: center;
      color: #999;
      font-size: 12px;
      margin-bottom: 8px;
    }
    .featured-slot-img img { width: 100%; height: 100%; object-fit: cover; }
    .slot-no { font-size: 12px; color: var(--green); font-weight: 900; margin-bottom: 4px; }
    .slot-name { font-size: 12px; font-weight: 900; line-height: 1.3; min-height: 32px; }
    .slot-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 8px; }
    .slot-actions button { padding: 7px 5px; font-size: 11px; border-radius: 10px; }
    .picker-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(17, 28, 14, .38);
      display: grid;
      place-items: center;
      padding: 18px;
    }
    .picker-modal {
      width: min(980px, 100%);
      max-height: min(760px, calc(100vh - 36px));
      overflow: auto;
      background: #fff;
      border-radius: 20px;
      border: 1px solid var(--line);
      box-shadow: 0 26px 80px rgba(20, 40, 16, .24);
      padding: 18px;
    }
    .picker-head { display: flex; justify-content: space-between; gap: 12px; align-items: center; margin-bottom: 12px; }
    .picker-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(132px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    .picker-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 8px;
      background: #fff;
      cursor: pointer;
    }
    .picker-card:hover { border-color: var(--green); box-shadow: 0 10px 24px rgba(47,125,36,.12); }
    .picker-card.selected { border-color: var(--green); background: #f3fbf1; }
    .picker-card.is-hidden { opacity: .48; }
    .picker-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 11px;
      overflow: hidden;
      background: #f2f6ef;
      display: grid;
      place-items: center;
      color: #999;
      font-size: 12px;
      margin-bottom: 8px;
    }
    .picker-img img { width: 100%; height: 100%; object-fit: cover; }
    .picker-title { font-size: 12px; font-weight: 900; line-height: 1.35; min-height: 48px; }
    .picker-price { color: var(--green); font-size: 12px; font-weight: 900; margin-top: 5px; }
    .order-table { width: 100%; border-collapse: collapse; min-width: 780px; }
    .order-table th, .order-table td { padding: 12px 10px; border-bottom: 1px solid #eef2eb; text-align: left; vertical-align: top; }
    .order-table th { color: #66705f; font-size: 13px; }

    .empty { padding: 30px; text-align: center; color: var(--muted); }

    @media (max-width: 900px) {
      .wrap { padding: 16px; }
      .topbar, .grid { display: block; }
      .side { position: static; max-height: none; margin-bottom: 16px; }
      .row, .row3, .images, .variant-grid, .card-grid { grid-template-columns: 1fr; }
      .config-images, .config-card-grid, .featured-slots, .picker-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      h1 { font-size: 28px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="app"></div>
  </div>

  <script>
    const API_PRODUCTS = 'api/products.php';
    const API_UPLOAD = 'api/upload.php';
    const API_SETTINGS = 'api/settings.php';
    const API_ORDERS = 'api/orders.php';
    const API_GIT = 'api/git.php';
    const API_BLOG = 'api/blog.php';
    const PASS_KEY = 'phuonglam_admin_password';
    const CATEGORY_ALIASES = { 'tinh-dau': 'bep-xong' };
    const normalizeCategoryId = value => CATEGORY_ALIASES[String(value || '')] || String(value || 'nen-thom');
    const CATEGORIES = [
      ['nen-thom', 'Nến Xông'],
      ['combo', 'Combo Xông Nhà'],
      ['thao-moc-xong', 'Thảo Mộc Xông'],
      ['bep-xong', 'Đèn Xông Tinh Dầu'],
      ['nen-tru', 'Nến Trụ'],
      ['nu-tram', 'Nụ Trầm'],
      ['phu-kien', 'Phụ Kiện Xông'],
      ['nen-ly', 'Nến Ly']
    ];
    const PRODUCT_TAGS = ['', 'Bán chạy', 'Mới', 'Nổi bật', 'Sale', 'Hết hàng'];

    let password = localStorage.getItem(PASS_KEY) || '';
    let products = [];
    let settings = { featuredIds: [], headerImages: [], categoryImages: {} };
    let orders = [];
    let selectedId = null;
    let listSearch = '';
    let listCategory = '';
    let activeTab = 'products';
    let featuredPickerIndex = null;
    let featuredPickerSearch = '';
    let saving = false;
    let apiOnline = true;
    let blogPosts = [];
    let blogCategory = 'huong-dan-xong';
    let blogSlug = '';
    let blogZipFile = null;
    let blogSaving = false;
    const app = document.getElementById('app');

    const fmt = value => Number(value || 0).toLocaleString('vi-VN') + 'đ';
    const esc = value => String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[ch]));
    const jsString = value => JSON.stringify(String(value ?? '')).replace(/</g, '\\u003c');
    const normalizeText = value => String(value ?? '')
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .replace(/đ/g, 'd')
      .trim();
    const id = () => 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
    const firstImage = product => (product.images || []).find(Boolean) || (product.variants || []).map(v => v.image).find(Boolean) || '';
    const isHidden = product => product?.hidden === true || product?.hidden === 'true';
    const selectedProduct = () => products.find(product => String(product.id) === String(selectedId));

    async function readJsonResponse(response, label) {
      const text = await response.text();
      try {
        return JSON.parse(text);
      } catch {
        if (text.trim().startsWith('<?php')) {
          throw new Error(`${label} chưa chạy được vì preview local không thực thi PHP.`);
        }
        throw new Error(`${label} trả về dữ liệu không đúng định dạng JSON.`);
      }
    }

    function normalizeProduct(product) {
      return {
        id: product.id || id(),
        sku: product.sku || '',
        categoryId: normalizeCategoryId(product.categoryId),
        name: product.name || '',
        price: Number(product.price || 0),
        originalPrice: product.originalPrice === '' ? null : (product.originalPrice == null ? null : Number(product.originalPrice || 0)),
        shortDesc: product.shortDesc || '',
        description: product.description || '',
        usage: product.usage || '',
        tag: product.tag || '',
        weight: product.weight === '' ? null : (product.weight == null ? null : Number(product.weight || 0)),
        hidden: isHidden(product),
        optionGroups: Array.isArray(product.optionGroups) ? product.optionGroups.map(group => ({
          name: group.name || '',
          values: Array.isArray(group.values) ? group.values.filter(Boolean) : []
        })).filter(group => group.name && group.values.length) : [],
        images: Array.isArray(product.images) ? product.images.filter(Boolean).slice(0, 9) : [],
        reviews: Array.isArray(product.reviews) ? product.reviews : [],
        variants: Array.isArray(product.variants) ? product.variants.map(v => ({
          id: v.id || id(),
          name: v.name || '',
          sku: v.sku || '',
          price: Number(v.price || 0),
          originalPrice: v.originalPrice === '' ? null : (v.originalPrice == null ? null : Number(v.originalPrice || 0)),
          weight: v.weight === '' ? null : (v.weight == null ? null : Number(v.weight || 0)),
          image: v.image || '',
          options: v.options && typeof v.options === 'object' && !Array.isArray(v.options) ? v.options : {}
        })) : []
      };
    }

    async function loadProducts() {
      app.innerHTML = '<div class="panel empty">Đang tải dữ liệu quản trị...</div>';
      try {
        const [productRes, settingRes, orderRes, blogRes] = await Promise.all([
          fetch(API_PRODUCTS, { cache: 'no-store' }),
          fetch(API_SETTINGS, { cache: 'no-store' }),
          fetch(API_ORDERS, { cache: 'no-store', headers: { 'X-Admin-Password': password } }).catch(() => null),
          fetch(API_BLOG, { cache: 'no-store' }).catch(() => null)
        ]);
        const productData = await readJsonResponse(productRes, 'API sản phẩm');
        const settingData = await readJsonResponse(settingRes, 'API cài đặt');
        const orderData = orderRes ? await readJsonResponse(orderRes, 'API đơn hàng') : { ok: true, orders: [] };
        const blogData = blogRes ? await readJsonResponse(blogRes, 'API Blog').catch(() => ({ ok: false })) : { ok: false };
        if (!productData.ok) throw new Error(productData.message || 'Không tải được dữ liệu sản phẩm.');
        if (!settingData.ok) throw new Error(settingData.message || 'Không tải được cài đặt website.');
        apiOnline = true;
        products = (productData.products || []).map(normalizeProduct);
        settings = normalizeSettings(settingData.settings || {});
        orders = Array.isArray(orderData.orders) ? orderData.orders : [];
        blogPosts = blogData.ok ? (blogData.posts || []) : [];
        selectedId = products[0]?.id || null;
        render();
      } catch (error) {
        try {
          const localRes = await fetch('data/products.json', { cache: 'no-store' });
          const localData = await localRes.json();
          const localProducts = Array.isArray(localData) ? localData : (localData.products || []);
          apiOnline = false;
          products = localProducts.map(normalizeProduct);
          settings = normalizeSettings({});
          orders = [];
          selectedId = products[0]?.id || null;
          render();
        } catch {
          app.innerHTML = `<div class="panel empty"><h2>Không tải được API</h2><p>${esc(error.message)}</p><p>Kiểm tra đã upload đủ file trong thư mục <strong>api</strong> và có thư mục <strong>data</strong>, <strong>uploads</strong> trên host chưa.</p></div>`;
        }
      }
    }

    function normalizeSettings(value) {
      const rawCategoryImages = value.categoryImages && typeof value.categoryImages === 'object' && !Array.isArray(value.categoryImages) ? value.categoryImages : {};
      const categoryImages = {};
      Object.entries(rawCategoryImages).forEach(([catId, src]) => {
        if (src) categoryImages[normalizeCategoryId(catId)] = src;
      });
      return {
        featuredIds: Array.isArray(value.featuredIds) ? value.featuredIds.map(String) : [],
        headerImages: Array.isArray(value.headerImages) ? value.headerImages.filter(Boolean) : [],
        categoryImages
      };
    }

    function renderLogin() {
      app.innerHTML = `
        <div class="panel login">
          <h1>Phương Lâm Admin</h1>
          <p class="sub">Nhập mật khẩu admin để thêm/sửa sản phẩm trực tiếp trên host.</p>
          <label>Mật khẩu admin</label>
          <input id="password" type="password" value="${esc(password)}" placeholder="Nhập mật khẩu" />
          <div class="actions" style="margin-top:16px">
            <button onclick="login()">Đăng nhập</button>
            <a href="index.html"><button class="secondary">Về trang chủ</button></a>
          </div>
        </div>
      `;
    }

    function login() {
      password = document.getElementById('password').value.trim();
      localStorage.setItem(PASS_KEY, password);
      loadProducts();
    }

    function render() {
      const product = selectedProduct();
      app.innerHTML = `
        <div class="topbar">
          <div>
            <h1>Quản lý website</h1>
            <div class="sub">Sản phẩm, phân loại, ảnh, bán chạy, header, danh mục và đơn hàng.</div>
            ${!apiOnline ? '<div class="sub" style="color:#d98221;font-weight:900">Đang ở chế độ preview local: xem được dữ liệu nhưng không lưu/upload trực tiếp. Lên host có PHP thì sẽ lưu được.</div>' : ''}
          </div>
          <div class="actions">
            <button onclick="saveAll()" ${saving || !apiOnline ? 'disabled' : ''}>${apiOnline ? 'Lưu local' : 'Preview local'}</button>
            <button class="secondary" onclick="previewWebsite()">Preview</button>
            <button class="secondary" onclick="pushGit()" ${saving || !apiOnline ? 'disabled' : ''}>Push Git</button>
          </div>
        </div>

        <div class="tabs">
          ${[
            ['products', 'Sản phẩm'],
            ['featured', 'Bán chạy'],
            ['header', 'Ảnh header'],
            ['categories', 'Ảnh danh mục'],
            ['blog', 'Bài viết'],
            ['orders', 'Đơn hàng']
          ].map(([key, label]) => `<button class="${activeTab === key ? 'tab active' : 'tab'}" onclick="activeTab='${key}'; render()">${label}</button>`).join('')}
        </div>

        ${activeTab === 'products' ? `
        <div class="grid">
          <aside class="panel side">
            <div class="actions" style="margin-bottom:12px">
              <button onclick="addProduct()">+ Thêm sản phẩm</button>
            </div>
            <input id="search" placeholder="Tìm sản phẩm..." value="${esc(listSearch)}" oninput="listSearch = this.value; renderProductList()" />
            <select id="catFilter" style="margin-top:10px" onchange="listCategory = this.value; renderProductList()">
              <option value="">Tất cả danh mục</option>
              ${CATEGORIES.map(([value, label]) => `<option value="${value}" ${listCategory === value ? 'selected' : ''}>${label}</option>`).join('')}
            </select>
            <div id="productList" style="margin-top:12px"></div>
          </aside>

          <main class="panel editor">
            ${product ? editorHtml(product) : '<div class="empty">Chưa có sản phẩm. Bấm “+ Thêm sản phẩm” để tạo mới.</div>'}
          </main>
        </div>
        ` : `<main class="panel editor">${adminTabHtml()}</main>`}
        ${featuredPickerIndex !== null ? featuredPickerHtml() : ''}
      `;
      if (activeTab === 'products') renderProductList();
    }

    function renderProductList() {
      const list = document.getElementById('productList');
      if (!list) return;
      const q = listSearch.toLowerCase();
      const cat = listCategory;
      const filtered = products.filter(product => {
        const matchesText = !q || [product.name, product.sku].join(' ').toLowerCase().includes(q);
        const matchesCat = !cat || product.categoryId === cat;
        return matchesText && matchesCat;
      });
      list.innerHTML = filtered.map(product => {
        const img = firstImage(product);
        const hidden = isHidden(product);
        return `
          <div class="product-item ${String(product.id) === String(selectedId) ? 'active' : ''} ${hidden ? 'is-hidden' : ''}" onclick="selectProduct('${esc(product.id)}')">
            ${img ? `<img class="thumb" src="${esc(img)}" />` : `<div class="thumb">Ảnh</div>`}
            <div>

              ? `<span style="color:#318223;font-weight:700">✓ ${esc(blogZipFile.name)}</span><button class="danger small" onclick="blogZipFile=null;blogSlug='';render()">✕</button>`

            <div>
              <label>Danh mục URL</label>
              <select onchange="blogCategory=this.value;render()">

            </div>
          </div>

          ${blogSlug || slugPreview ? `
            <p class="muted" style="margin:10px 0 0;font-size:13px">
              📌 Sẽ lưu tại: <strong>blog/${esc(blogCategory)}/${esc(slugPreview || blogSlug)}/index.html</strong>
              → URL: <code>https://phuonglam.com/blog/${esc(blogCategory)}/${esc(slugPreview || blogSlug)}/</code>
            </p>
          ` : ''}

          <div style="margin-top:18px">
            <button onclick="saveBlogPost()" ${blogSaving || !apiOnline || !blogZipFile ? 'disabled' : ''}>
              ${blogSaving ? 'Đang lưu...' : '💾 Lưu local bài viết'}
            </button>
            <button class="secondary" onclick="previewWebsite()">Preview</button>

        <h3 style="margin:0 0 12px">Bài viết hiện có (${blogPosts.length})</h3>
        ${blogPosts.length === 0
          ? '<p class="muted">Chưa có bài viết nào.</p>'
          : `<div style="display:flex;flex-direction:column;gap:10px">

              <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;background:#f9fbf7;border:1px solid #dde8d8;border-radius:14px;padding:14px 18px;flex-wrap:wrap">
                <div>
                  <div style="font-weight:700;color:#1f3a1a">${esc(post.title || post.slug)}</div>
                  <div class="muted" style="font-size:12px;margin-top:2px">${esc(post.categoryLabel || post.category)} / ${esc(post.slug)}</div>
                  <div class="muted" style="font-size:13px;margin-top:2px">
                    <a href="${esc(post.url)}" target="_blank" style="color:#318223">Xem bài viết ↗</a>

              </div>

        }
      `;

    function slugifyVi(text) {
      return String(text)
        .normalize('NFD').replace(/[̀-ͯ]/g, '')
        .replace(/đ/gi, 'd')
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '');
    }

    async function loadBlogPosts() {
      try {
        const res = await fetch(API_BLOG, { cache: 'no-store' });
        const data = await readJsonResponse(res, 'API Blog');
        if (data.ok) blogPosts = data.posts || [];
      } catch { blogPosts = []; }
    }

    async function saveBlogPost() {
      if (!blogZipFile) return;
      const slug = blogSlug || slugifyVi(blogZipFile.name.replace(/\.zip$/i, ''));
      blogSaving = true;
      render();
      try {
        const form = new FormData();
        form.append('category', blogCategory);
        if (slug) form.append('slug', slug);
        form.append('zip', blogZipFile, blogZipFile.name);
        const res = await fetch(API_BLOG, { method: 'POST', body: form });
        const data = await readJsonResponse(res, 'API Blog');
        if (!data.ok) throw new Error(data.message || 'Lưu bài viết thất bại');
        blogPosts = data.posts || blogPosts;
        blogZipFile = null;
        blogSlug = '';
        alert(`✅ Đã lưu local! Bài viết tại: ${data.url}\nSitemap và danh sách blog đã cập nhật. Bấm Preview để kiểm tra, ổn rồi bấm Push Git.`);
      } catch (error) {
        alert('Lỗi: ' + error.message);
      } finally {
        blogSaving = false;
        render();
      }
    }

    async function deleteBlogPost(category, slug) {
      if (!confirm(`Xoá bài viết blog/${category}/${slug}/ ?\nThao tác này không khôi phục được.`)) return;
      try {
        const res = await fetch(API_BLOG, {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ category, slug })
        });
        const data = await readJsonResponse(res, 'API Blog');
        if (!data.ok) throw new Error(data.message || 'Xoá thất bại');
        blogPosts = data.posts || blogPosts;
        render();
      } catch (error) {
        alert('Lỗi: ' + error.message);
      }
    }

            <div><label>Giá gốc</label><input type="number" value="${esc(variant.originalPrice ?? '')}" oninput="updateVariant(${index}, 'originalPrice', this.value)" /></div>
            <div><label>Gram</label><input type="number" value="${esc(variant.weight ?? '')}" oninput="updateVariant(${index}, 'weight', this.value)" /></div>
            <div><label>SKU</label><input value="${esc(variant.sku)}" oninput="updateVariant(${index}, 'sku', this.value)" /></div>
            <div><label>&nbsp;</label><button class="danger small" onclick="removeVariant(${index})">Xoá</button></div>
          </div>
          ${optionGroups.length ? `<div class="row3" style="margin-top:10px">${optionGroups.map(group => optionInputHtml(group, variant, index)).join('')}</div>` : ''}
        </div>
      `;
    }

    function selectProduct(productId) {
      selectedId = productId;
      render();
    }

    function updateSelected(mutator, shouldRender = false) {
      const product = selectedProduct();
      if (!product) return;
      mutator(product);
      if (shouldRender) render();
    }

    function updateField(field, value) {
      updateSelected(product => {
        if (field === 'hidden') {
          product.hidden = value === 'true';
        } else if (['price', 'originalPrice', 'weight'].includes(field)) {
          product[field] = value === '' ? null : Number(value);
        } else {
          product[field] = value;
        }
      });
      renderProductList();
    }

    function addProduct() {
      const product = normalizeProduct({
        id: id(),
        sku: 'PL-' + String(Date.now()).slice(-4),
        categoryId: listCategory || 'nen-thom',
        name: 'Sản phẩm mới',
        price: 0,
        images: [],
        variants: []
      });
      products.unshift(product);
      selectedId = product.id;
      render();
    }

    function duplicateProduct() {
      const product = selectedProduct();
      if (!product) return;
      const copy = normalizeProduct(JSON.parse(JSON.stringify(product)));
      copy.id = id();
      copy.name = copy.name + ' - bản sao';
      products.unshift(copy);
      selectedId = copy.id;
      render();
    }

    function deleteProduct() {
      const product = selectedProduct();
      if (!product || !confirm('Xoá sản phẩm này?')) return;
      products = products.filter(item => String(item.id) !== String(product.id));
      selectedId = products[0]?.id || null;
      render();
    }

    function toggleHidden() {
      updateSelected(product => {
        product.hidden = !isHidden(product);
      }, true);
    }

    function addVariant() {
      updateSelected(product => {
        product.variants = product.variants || [];
        const options = {};
        (product.optionGroups || []).forEach(group => {
          if (group.name && group.values?.[0]) options[group.name] = group.values[0];
        });
        product.variants.push({ id: id(), name: '', sku: '', price: product.price || 0, originalPrice: product.originalPrice || null, weight: product.weight || null, image: '', options });
      }, true);
    }

    function addOptionGroup() {
      updateSelected(product => {
        product.optionGroups = product.optionGroups || [];
        product.optionGroups.push({ name: '', values: [] });
      }, true);
    }

    function updateOptionGroup(index, field, value) {
      updateSelected(product => {
        product.optionGroups = product.optionGroups || [];
        const group = product.optionGroups[index];
        if (!group) return;
        const oldName = group.name;
        if (field === 'values') {
          group.values = value.split(',').map(item => item.trim()).filter(Boolean);
          return;
        }
        group.name = value;
        if (oldName && oldName !== value) {
          (product.variants || []).forEach(variant => {
            if (!variant.options || !(oldName in variant.options)) return;
            variant.options[value] = variant.options[oldName];
            delete variant.options[oldName];
          });
        }
      });
    }

    function removeOptionGroup(index) {
      updateSelected(product => {
        const group = product.optionGroups?.[index];
        product.optionGroups.splice(index, 1);
        if (group?.name) {
          (product.variants || []).forEach(variant => {
            if (variant.options) delete variant.options[group.name];
          });
        }
      }, true);
    }

    function updateVariant(index, field, value) {
      updateSelected(product => {
        const variant = product.variants[index];
        if (!variant) return;
        if (['price', 'originalPrice', 'weight'].includes(field)) {
          variant[field] = value === '' ? null : Number(value);
        } else {
          variant[field] = value;
        }
      });
    }

    function updateVariantOption(index, groupName, value) {
      updateSelected(product => {
        const variant = product.variants[index];
        if (!variant) return;
        variant.options = variant.options || {};
        if (value) variant.options[groupName] = value;
        else delete variant.options[groupName];
      }, true);
    }

    function removeVariant(index) {
      updateSelected(product => product.variants.splice(index, 1), true);
    }

    function canvasToBlob(canvas, type, quality) {
      return new Promise(resolve => canvas.toBlob(resolve, type, quality));
    }

    async function optimizeImageFile(file) {
      if (!file || !file.type?.startsWith('image/')) return file;
      const imageUrl = URL.createObjectURL(file);
      try {
        const image = new Image();
        image.src = imageUrl;
        await image.decode();

        const maxSize = 1600;
        const ratio = Math.min(1, maxSize / Math.max(image.width, image.height));
        const width = Math.max(1, Math.round(image.width * ratio));
        const height = Math.max(1, Math.round(image.height * ratio));
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d', { alpha: false });
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, width, height);
        ctx.drawImage(image, 0, 0, width, height);

        const webpBlob = await canvasToBlob(canvas, 'image/webp', 0.82);
        if (!webpBlob) return file;
        const baseName = file.name.replace(/\.[^.]+$/, '') || 'product-image';
        return new File([webpBlob], `${baseName}.webp`, { type: 'image/webp' });
      } finally {
        URL.revokeObjectURL(imageUrl);
      }
    }

    async function uploadFile(file) {
      if (!apiOnline) throw new Error('Chế độ mở file tĩnh không upload ảnh trực tiếp được. Hãy chạy node tools/local_admin_server.js rồi mở admin qua http://127.0.0.1:8000/admin-upload.html.');
      if (!file) return '';
      const optimizedFile = await optimizeImageFile(file);
      const form = new FormData();
      form.append('password', password);
      form.append('image', optimizedFile);
      const res = await fetch(API_UPLOAD, { method: 'POST', body: form });
      const data = await readJsonResponse(res, 'API upload ảnh');
      if (!data.ok) throw new Error(data.message || 'Upload ảnh thất bại.');
      return data.url;
    }

    function chooseFile(callback) {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.onchange = async () => {
        try {
          const url = await uploadFile(input.files[0]);
          callback(url);
        } catch (error) {
          alert(error.message);
        }
      };
      input.click();
    }

    function getDroppedImage(event) {
      event.preventDefault();
      event.stopPropagation();
      event.currentTarget.classList.remove('dragging');
      const file = [...(event.dataTransfer?.files || [])].find(item => item.type && item.type.startsWith('image/'));
      if (!file) alert('Hãy kéo đúng file ảnh vào ô này.');
      return file;
    }

    function handleDragOver(event) {
      event.preventDefault();
      event.stopPropagation();
      event.currentTarget.classList.add('dragging');
    }

    function handleDragLeave(event) {
      event.preventDefault();
      event.stopPropagation();
      event.currentTarget.classList.remove('dragging');
    }

    async function dropProductImage(event, index) {
      const file = getDroppedImage(event);
      if (!file) return;
      try {
        const url = await uploadFile(file);
        updateSelected(product => {
          product.images = product.images || [];
          product.images[index] = url;
        }, true);
      } catch (error) {
        alert(error.message);
      }
    }

    async function dropVariantImage(event, index) {
      const file = getDroppedImage(event);
      if (!file) return;
      try {
        const url = await uploadFile(file);
        updateSelected(product => {
          product.variants[index].image = url;
        }, true);
      } catch (error) {
        alert(error.message);
      }
    }

    async function uploadDropped(event, callback) {
      const file = getDroppedImage(event);
      if (!file) return;
      try {
        const url = await uploadFile(file);
        callback(url);
        render();
      } catch (error) {
        alert(error.message);
      }
    }

    function pickProductImage(index) {
      chooseFile(url => updateSelected(product => {
        product.images = product.images || [];
        product.images[index] = url;
      }, true));
    }

    function removeProductImage(index) {
      updateSelected(product => {
        product.images.splice(index, 1);
      }, true);
    }

    function pickVariantImage(index) {
      chooseFile(url => updateSelected(product => {
        product.variants[index].image = url;
      }, true));
    }

    function openFeaturedPicker(index) {
      featuredPickerIndex = index;
      featuredPickerSearch = '';
      render();
    }

    function closeFeaturedPicker() {
      featuredPickerIndex = null;
      featuredPickerSearch = '';
      render();
    }

    function chooseFeaturedProduct(index, productId) {
      setFeaturedSlot(index, productId);
      featuredPickerIndex = null;
      featuredPickerSearch = '';
      render();
    }

    function cleanFeaturedIds(ids) {
      const seen = new Set();
      return ids.map(id => String(id || '')).filter(id => {
        if (!id || seen.has(id)) return false;
        seen.add(id);
        return true;
      });
    }

    function setFeaturedSlot(index, productId) {
      const id = String(productId || '');
      const ids = [...(settings.featuredIds || [])].map(String);
      const existingIndex = id ? ids.findIndex(item => item === id) : -1;
      const currentId = ids[index] || '';
      if (id && existingIndex !== -1 && existingIndex !== index) {
        ids[existingIndex] = currentId;
        ids[index] = id;
      } else if (id) ids[index] = id;
      else ids.splice(index, 1);
      settings.featuredIds = cleanFeaturedIds(ids);
      render();
    }

    function moveFeatured(index, direction) {
      const ids = [...(settings.featuredIds || [])];
      const nextIndex = index + direction;
      if (nextIndex < 0 || nextIndex >= ids.length) return;
      [ids[index], ids[nextIndex]] = [ids[nextIndex], ids[index]];
      settings.featuredIds = cleanFeaturedIds(ids);
      render();
    }

    function removeFeaturedSlot(index) {
      const ids = [...(settings.featuredIds || [])];
      ids.splice(index, 1);
      settings.featuredIds = cleanFeaturedIds(ids);
      render();
    }

    function pickHeaderImage(index) {
      chooseFile(url => {
        settings.headerImages = settings.headerImages || [];
        settings.headerImages[index] = url;
        render();
      });
    }

    function dropHeaderImage(event, index) {
      uploadDropped(event, url => {
        settings.headerImages = settings.headerImages || [];
        settings.headerImages[index] = url;
      });
    }

    function removeHeaderImage(index) {
      settings.headerImages.splice(index, 1);
      render();
    }

    function pickCategoryImage(categoryId) {
      chooseFile(url => {
        settings.categoryImages = settings.categoryImages || {};
        settings.categoryImages[categoryId] = url;
        render();
      });
    }

    function dropCategoryImage(event, categoryId) {
      uploadDropped(event, url => {
        settings.categoryImages = settings.categoryImages || {};
        settings.categoryImages[categoryId] = url;
      });
    }

    function removeCategoryImage(categoryId) {
      delete settings.categoryImages[categoryId];
      render();
    }

    async function saveSettings() {
      if (!apiOnline) throw new Error('Chế độ mở file tĩnh không lưu trực tiếp được. Hãy chạy node tools/local_admin_server.js rồi mở admin qua http://127.0.0.1:8000/admin-upload.html.');
      const res = await fetch(API_SETTINGS, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Admin-Password': password
        },
        body: JSON.stringify({ settings: normalizeSettings(settings) })
      });
      const data = await readJsonResponse(res, 'API cài đặt');
      if (!data.ok) throw new Error(data.message || 'Lưu cài đặt thất bại.');
      settings = normalizeSettings(data.settings || settings);
    }

    async function updateOrderStatus(orderId, status) {
      try {
        if (!apiOnline) throw new Error('Chế độ mở file tĩnh không cập nhật đơn hàng trực tiếp được.');
        const res = await fetch(API_ORDERS, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Admin-Password': password
          },
          body: JSON.stringify({ action: 'updateStatus', id: orderId, status })
        });
        const data = await readJsonResponse(res, 'API đơn hàng');
        if (!data.ok) throw new Error(data.message || 'Không cập nhật được đơn hàng.');
        orders = Array.isArray(data.orders) ? data.orders : orders;
        render();
      } catch (error) {
        alert(error.message);
      }
    }

    async function saveProducts() {
      if (!apiOnline) throw new Error('Chế độ mở file tĩnh không lưu trực tiếp được. Hãy chạy node tools/local_admin_server.js rồi mở admin qua http://127.0.0.1:8000/admin-upload.html.');
      const res = await fetch(API_PRODUCTS, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Admin-Password': password
        },
        body: JSON.stringify({ products: products.map(normalizeProduct) })
      });
      const data = await readJsonResponse(res, 'API sản phẩm');
      if (!data.ok) throw new Error(data.message || 'Lưu thất bại.');
      products = (data.products || []).map(normalizeProduct);
    }

    async function saveAll() {
      saving = true;
      render();
      try {
        await saveProducts();
        await saveSettings();
        alert('Đã lưu local và build lại trang SEO/sitemap. Bấm Preview để kiểm tra trước khi Push Git.');
      } catch (error) {
        alert(error.message);
      } finally {
        saving = false;
        render();
      }
    }

    function previewWebsite() {
      window.open(`${window.location.origin}/?preview=${Date.now()}`, '_blank');
    }

    async function pushGit() {
      if (!apiOnline) {
        alert('Push Git chỉ dùng được khi chạy admin bằng node tools/local_admin_server.js.');
        return;
      }
      const ok = confirm('Push Git sẽ commit toàn bộ thay đổi local và đẩy lên GitHub. GitHub Pages có thể deploy website chính sau vài phút. Tiếp tục?');
      if (!ok) return;
      saving = true;
      render();
      try {
        await saveProducts();
        await saveSettings();
        const res = await fetch(API_GIT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'push' })
        });
        const data = await readJsonResponse(res, 'API Git');
        if (!data.ok) throw new Error(data.message || 'Push Git thất bại.');
        alert(data.git?.message || 'Đã push lên GitHub.');
      } catch (error) {
        alert(error.message);
      } finally {
        saving = false;
        render();
      }
    }

    if (!password) renderLogin();
    else loadProducts();
  </script>
</body>
</html>
