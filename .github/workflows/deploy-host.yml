name: Deploy website to hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-host
  cancel-in-progress: true

jobs:
  deploy:
    name: Upload to hosting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install FTP client
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy by FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          set -euo pipefail
          lftp <<EOF
          set ftp:ssl-allow no
          set ftp:passive-mode on
          set net:timeout 60
          set net:max-retries 2
          set cmd:fail-exit yes
          open -p "$FTP_PORT" "$FTP_SERVER"
          user "$FTP_USERNAME" "$FTP_PASSWORD"
          mirror --reverse --verbose \
            --exclude-glob .git/ \
            --exclude-glob .github/ \
            --exclude-glob deploy/ \
            --exclude-glob "rule vs skill/" \
            --exclude-glob "file sản phẩm từ shopee/" \
            --exclude-glob "ảnh bài viết/" \
            --exclude-glob .DS_Store \
            --exclude-glob README.md \
            --exclude-glob GITHUB_DEPLOY.md \
            ./ "$FTP_SERVER_DIR"
          bye
          EOF
