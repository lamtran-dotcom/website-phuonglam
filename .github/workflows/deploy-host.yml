name: Deploy website to hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-host
  cancel-in-progress: true

jobs:
  deploy:
    name: Upload to hosting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy by FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ${{ secrets.FTP_PROTOCOL }}
          port: ${{ secrets.FTP_PORT }}
          timeout: 120000
          log-level: verbose
          local-dir: ./
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            deploy/**
            rule vs skill/**
            file sản phẩm từ shopee/**
            ảnh bài viết/**
            **/.DS_Store
            README.md
            GITHUB_DEPLOY.md
