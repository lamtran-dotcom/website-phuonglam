<div id="tweaks-panel">
  <div class="tweak-title">Tweaks</div>
  <div class="tweak-row">
    <label class="tweak-label">Màu chủ đạo</label>
    <input type="color" value="#318223" oninput="document.querySelectorAll('*').forEach(el=>{}); applyTweak('primaryColor', this.value)" />

  <div class="tweak-row">
    <label class="tweak-label">Bo góc: <span id="radius-val">10</span>px</label>

  </div>
  <div class="tweak-row">
    <label class="tweak-label">Cỡ chữ: <span id="font-val">100</span>%</label>
    <input type="range" min="85" max="115" value="100" oninput="document.documentElement.style.fontSize=(this.value/100*16)+'px'; document.getElementById('font-val').textContent=this.value; applyTweak('fontScale', +this.value)" />
  </div>
</div>
